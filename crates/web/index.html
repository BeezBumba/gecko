<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Gecko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #ccc;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #setup h2 {
            margin-bottom: 4px;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-row .file-label {
            width: 100px;
            text-align: right;
            color: #aaa;
            font-size: 14px;
        }

        .file-picker {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: 0 0 auto;
            width: auto;
            white-space: nowrap;
            line-height: 1.2;
            text-align: center;
        }

        .file-row .name {
            color: #8f8;
            font-size: 14px;
            min-width: 120px;
        }

        .file-picker,
        #start {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-picker:hover,
        #start:hover {
            background: #444;
            border-color: #8f8;
        }

        #start {
            margin-top: 8px;
            padding: 10px 32px;
            font-size: 16px;
            align-self: stretch;
            text-align: center;
        }

        #start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        canvas {
            width: 100vw;
            height: 100vh;
        }

        .file-picker input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- shoutout to hazel, vxpm, geo, pdawg, lycoder and everyone else :> -->

    <div id="setup">
        <div class="file-row">
            <label class="file-label">ROM / Disc:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-rom" accept=".dol,.bin,.ipl,.iso,.rvz,.zip">
            </label>
            <span class="name" id="rom-name">none</span>
        </div>

        <div class="file-row">
            <label class="file-label">DSP IROM:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-dsp" accept=".bin">
            </label>
            <span class="name" id="dsp-name">none</span>
        </div>

        <div class="file-row">
            <label class="file-label">DSP COEF:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-coef" accept=".bin">
            </label>
            <span class="name" id="coef-name">none</span>
        </div>

        <div class="file-row">
            <label class="file-label">GC IPL:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-ipl" accept=".bin,.ipl">
            </label>
            <span class="name" id="ipl-name">optional</span>
        </div>

        <button id="start" disabled>Start</button>
    </div>

    <script type="module">
        import init, { start_emulator_file } from './pkg/web.js';

        async function run() {
            window.addEventListener('error', (event) => {
                console.error('[web] window error:', event.message, event.error);
            });
            window.addEventListener('unhandledrejection', (event) => {
                console.error('[web] unhandled rejection:', event.reason);
            });

            await init();
            console.log('[web] wasm init complete');

            let romFile = null;
            let romName = '';
            let dspData = null;
            let coefData = null;
            let iplData = null;

            const inputRom = document.getElementById('input-rom');
            const inputDsp = document.getElementById('input-dsp');
            const inputCoef = document.getElementById('input-coef');
            const inputIpl = document.getElementById('input-ipl');
            const romNameEl = document.getElementById('rom-name');
            const dspNameEl = document.getElementById('dsp-name');
            const coefNameEl = document.getElementById('coef-name');
            const iplNameEl = document.getElementById('ipl-name');
            const startBtn = document.getElementById('start');
            const pendingFileReads = new Set();

            function refreshStartButton() {
                startBtn.disabled = !romFile || pendingFileReads.size > 0;
            }

            refreshStartButton();

            function readFile(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(new Uint8Array(reader.result));
                    reader.readAsArrayBuffer(file);
                });
            }

            inputRom.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    console.log('[web] selected ROM/disc:', file.name, 'bytes=', file.size);
                    romFile = file;
                    romName = file.name;
                    romNameEl.textContent = file.name;
                    refreshStartButton();
                } else {
                    romFile = null;
                    romName = '';
                    romNameEl.textContent = 'none';
                    refreshStartButton();
                }
            });

            inputDsp.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    console.log('[web] selected DSP IROM:', file.name, 'bytes=', file.size);
                    const readToken = Symbol('dsp-irom-read');
                    pendingFileReads.add(readToken);
                    refreshStartButton();
                    try {
                        dspData = await readFile(file);
                        dspNameEl.textContent = file.name;
                    } finally {
                        pendingFileReads.delete(readToken);
                        refreshStartButton();
                    }
                } else {
                    dspData = null;
                    dspNameEl.textContent = 'optional';
                    refreshStartButton();
                }
            });

            inputCoef.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    console.log('[web] selected DSP COEF:', file.name, 'bytes=', file.size);
                    const readToken = Symbol('dsp-coef-read');
                    pendingFileReads.add(readToken);
                    refreshStartButton();
                    try {
                        coefData = await readFile(file);
                        coefNameEl.textContent = file.name;
                    } finally {
                        pendingFileReads.delete(readToken);
                        refreshStartButton();
                    }
                } else {
                    coefData = null;
                    coefNameEl.textContent = 'optional';
                    refreshStartButton();
                }
            });

            inputIpl.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    console.log('[web] selected GC IPL:', file.name, 'bytes=', file.size);
                    const readToken = Symbol('gc-ipl-read');
                    pendingFileReads.add(readToken);
                    refreshStartButton();
                    try {
                        iplData = await readFile(file);
                        iplNameEl.textContent = file.name;
                    } finally {
                        pendingFileReads.delete(readToken);
                        refreshStartButton();
                    }
                } else {
                    iplData = null;
                    iplNameEl.textContent = 'optional';
                    refreshStartButton();
                }
            });

            startBtn.addEventListener('click', async () => {
                if (!romFile) return;
                if (pendingFileReads.size > 0) {
                    console.warn('[web] waiting for selected support files to finish loading');
                    refreshStartButton();
                    return;
                }
                console.log('[web] launching emulator for', romName);

                document.getElementById('setup').style.display = 'none';
                startBtn.disabled = true;
                try {
                    await start_emulator_file(romFile, dspData ?? undefined, coefData ?? undefined, iplData ?? undefined);
                } catch (err) {
                    console.error('[web] start_emulator failed:', err);
                    document.getElementById('setup').style.display = 'flex';
                    startBtn.disabled = false;
                }
            });
        }

        run();
    </script>
</body>

</html>
