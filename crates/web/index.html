<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Gecko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #ccc;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #setup h2 {
            margin-bottom: 4px;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-row .file-label {
            width: 100px;
            text-align: right;
            color: #aaa;
            font-size: 14px;
        }

        .file-picker {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: 0 0 auto;
            width: auto;
            white-space: nowrap;
            line-height: 1.2;
            text-align: center;
        }

        .file-row .name {
            color: #8f8;
            font-size: 14px;
            min-width: 120px;
        }

        .file-picker,
        #start {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-picker:hover,
        #start:hover {
            background: #444;
            border-color: #8f8;
        }

        #start {
            margin-top: 8px;
            padding: 10px 32px;
            font-size: 16px;
            align-self: stretch;
            text-align: center;
        }

        #start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #warning {
            margin-top: 4px;
            color: #f7b267;
            font-size: 13px;
            max-width: 700px;
            text-align: center;
        }

        canvas {
            width: 100vw;
            height: 100vh;
        }

        .file-picker input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- shoutout to hazel, vxpm, geo, pdawg, lycoder and everyone else :> -->

        <div id="setup">
        <div class="file-row">
            <label class="file-label">Boot Mode:</label>
            <select id="boot-mode" class="file-picker">
                <option value="dol">DOL</option>
                <option value="ipl">IPL</option>
                <option value="disc">Disc</option>
            </select>
            <span class="name">choose how to boot</span>
        </div>

        <div class="file-row">
            <label class="file-label" id="primary-label">DOL:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-primary" accept=".dol,.bin,.ipl,.iso,.rvz,.zip">
            </label>
            <span class="name" id="primary-name">none</span>
        </div>

        <div class="file-row" id="disc-row" style="display:none">
            <label class="file-label">Disc (opt):</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-disc" accept=".iso,.rvz,.zip">
            </label>
            <span class="name" id="disc-name">none</span>
        </div>

        <div class="file-row" id="dsp-row">
            <label class="file-label">DSP IROM:</label>
            <label class="file-picker">
                <span>Choose file</span>
                <input type="file" id="input-dsp" accept=".bin">
            </label>
            <span class="name" id="dsp-name">none</span>
        </div>

        <button id="start" disabled>Start</button>
        <div id="warning"></div>
    </div>

    <script type="module">
        import init, { start_emulator } from './pkg/gecko_web.js';

        async function run() {
            await init();

            let primaryData = null;
            let primaryName = '';
            let discData = null;
            let discName = '';
            let dspData = null;

            const bootMode = document.getElementById('boot-mode');
            const inputPrimary = document.getElementById('input-primary');
            const inputDisc = document.getElementById('input-disc');
            const inputDsp = document.getElementById('input-dsp');
            const primaryLabel = document.getElementById('primary-label');
            const primaryNameEl = document.getElementById('primary-name');
            const discNameEl = document.getElementById('disc-name');
            const dspNameEl = document.getElementById('dsp-name');
            const discRow = document.getElementById('disc-row');
            const startBtn = document.getElementById('start');
            const warningEl = document.getElementById('warning');

            function readFile(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(new Uint8Array(reader.result));
                    reader.readAsArrayBuffer(file);
                });
            }

            function updateModeUi() {
                const mode = bootMode.value;
                if (mode === 'dol') {
                    primaryLabel.textContent = 'DOL:';
                    inputPrimary.accept = '.dol';
                    discRow.style.display = 'none';
                    warningEl.textContent = '';
                } else if (mode === 'ipl') {
                    primaryLabel.textContent = 'IPL:';
                    inputPrimary.accept = '.bin,.ipl';
                    discRow.style.display = 'flex';
                    warningEl.textContent = '';
                } else {
                    primaryLabel.textContent = 'Disc:';
                    inputPrimary.accept = '.iso,.rvz,.zip';
                    discRow.style.display = 'none';
                    warningEl.textContent = 'Wii discs are detected automatically. Wii browser boot is currently experimental and may fail without browser-compatible NAND/IOS filesystem support.';
                }
                startBtn.disabled = !primaryData;
            }

            bootMode.addEventListener('change', () => {
                primaryData = null;
                primaryName = '';
                discData = null;
                discName = '';
                inputPrimary.value = '';
                inputDisc.value = '';
                primaryNameEl.textContent = 'none';
                discNameEl.textContent = 'none';
                updateModeUi();
            });

            inputPrimary.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    primaryData = await readFile(file);
                    primaryName = file.name;
                    primaryNameEl.textContent = file.name;
                    startBtn.disabled = false;
                }
            });

            inputDisc.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    discData = await readFile(file);
                    discName = file.name;
                    discNameEl.textContent = file.name;
                }
            });

            inputDsp.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    dspData = await readFile(file);
                    dspNameEl.textContent = file.name;
                }
            });

            startBtn.addEventListener('click', () => {
                if (!primaryData) return;
                try {
                    start_emulator(
                        bootMode.value,
                        primaryData,
                        primaryName,
                        discData ?? undefined,
                        discName || undefined,
                        dspData ?? undefined,
                    );
                    document.getElementById('setup').style.display = 'none';
                } catch (err) {
                    warningEl.textContent = `Failed to start emulator: ${err}`;
                }
            });

            updateModeUi();
        }

        run();
    </script>
</body>

</html>
